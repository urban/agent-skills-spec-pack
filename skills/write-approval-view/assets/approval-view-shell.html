<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark light;
      --font-body: "IBM Plex Sans", "Segoe UI", sans-serif;
      --font-display: "Instrument Serif", "Iowan Old Style", "Palatino Linotype", serif;
      --font-mono: "IBM Plex Mono", "SFMono-Regular", monospace;
      --bg: #081018;
      --surface: rgba(15, 24, 36, 0.84);
      --surface-elevated: rgba(21, 33, 48, 0.95);
      --surface-recessed: rgba(7, 13, 21, 0.92);
      --text: #e8eef5;
      --text-dim: #93a6be;
      --accent: #c79a32;
      --accent-strong: #ebc46c;
      --accent-dim: rgba(199, 154, 50, 0.14);
      --info: #4f88b8;
      --info-dim: rgba(79, 136, 184, 0.14);
      --success: #5f8d74;
      --success-dim: rgba(95, 141, 116, 0.14);
      --warning: #b97443;
      --warning-dim: rgba(185, 116, 67, 0.16);
      --danger: #a45e59;
      --danger-dim: rgba(164, 94, 89, 0.14);
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.16);
      --shadow: 0 28px 60px rgba(0, 0, 0, 0.28);
      --shadow-soft: 0 12px 28px rgba(0, 0, 0, 0.18);
      --code-bg: rgba(255, 255, 255, 0.04);
      --grid-line: rgba(255, 255, 255, 0.05);
      --rail: rgba(255, 255, 255, 0.09);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f2ea;
        --surface: rgba(255, 252, 247, 0.9);
        --surface-elevated: rgba(255, 255, 255, 0.98);
        --surface-recessed: rgba(236, 228, 216, 0.92);
        --text: #1e2836;
        --text-dim: #627181;
        --accent: #a66d1f;
        --accent-strong: #c78b30;
        --accent-dim: rgba(166, 109, 31, 0.1);
        --info: #2f6690;
        --info-dim: rgba(47, 102, 144, 0.1);
        --success: #376b52;
        --success-dim: rgba(55, 107, 82, 0.1);
        --warning: #a25d29;
        --warning-dim: rgba(162, 93, 41, 0.12);
        --danger: #924d49;
        --danger-dim: rgba(146, 77, 73, 0.12);
        --border: rgba(30, 40, 54, 0.08);
        --border-strong: rgba(30, 40, 54, 0.16);
        --shadow: 0 24px 48px rgba(60, 67, 84, 0.12);
        --shadow-soft: 0 12px 24px rgba(60, 67, 84, 0.08);
        --code-bg: rgba(30, 40, 54, 0.05);
        --grid-line: rgba(30, 40, 54, 0.05);
        --rail: rgba(30, 40, 54, 0.09);
      }
    }

    * { box-sizing: border-box; }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      color: var(--text);
      background-color: var(--bg);
      background-image:
        radial-gradient(circle at 14% 0%, var(--accent-dim) 0%, transparent 34%),
        radial-gradient(circle at 100% 12%, var(--info-dim) 0%, transparent 26%),
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: auto, auto, 28px 28px, 28px 28px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body[data-approval-view="rich-v1"] {
      font-variant-numeric: tabular-nums;
    }

    a {
      color: var(--accent-strong);
      text-decoration-thickness: 1px;
      text-underline-offset: 0.18em;
    }

    code,
    pre,
    .section-kicker,
    .toc,
    .glance-card__label,
    .traceability-item__id,
    .status-pill,
    .hero-note__label,
    .diagram-shell__label,
    .visual-evidence__label,
    .scope-card__label,
    .review-card__label,
    .callout__label,
    .validator-card__label,
    .delta-card__label,
    .timeline-item__marker,
    .evidence-source__label {
      font-family: var(--font-mono);
    }

    .layout {
      max-width: 1420px;
      margin: 0 auto;
      padding: 24px 20px 72px;
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr);
      gap: 28px;
    }

    .main {
      min-width: 0;
      display: grid;
      gap: 20px;
    }

    .toc {
      position: sticky;
      top: 24px;
      align-self: start;
      max-height: calc(100dvh - 48px);
      overflow-y: auto;
      padding: 18px 0 18px 14px;
      min-width: 0;
      border-left: 1px solid var(--rail);
    }

    .toc-title {
      position: relative;
      margin-bottom: 12px;
      padding: 0 0 12px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.68rem;
      font-weight: 600;
    }

    .toc-title::before {
      content: "";
      position: absolute;
      left: 0;
      top: 2px;
      bottom: 14px;
      width: 2px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--accent), transparent);
    }

    .toc a {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 10px 12px;
      border-left: 2px solid transparent;
      border-radius: 12px;
      color: var(--text-dim);
      text-decoration: none;
      transition: background 160ms ease, color 160ms ease, border-color 160ms ease, transform 160ms ease;
      font-size: 0.83rem;
      line-height: 1.35;
      min-width: 0;
    }

    .toc a:hover,
    .toc a.active {
      color: var(--text);
      background: color-mix(in srgb, var(--surface-elevated) 84%, var(--accent-dim) 16%);
      border-left-color: var(--accent);
      transform: translateX(2px);
    }

    .toc-index {
      color: var(--accent-strong);
      flex: none;
      opacity: 0.92;
    }

    .page-hero,
    .glance,
    .approval-section {
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      min-width: 0;
      overflow: hidden;
    }

    .page-hero {
      position: relative;
      padding: 34px 34px 30px;
      display: grid;
      gap: 0;
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--surface-elevated) 84%, var(--accent-dim) 16%), var(--surface)),
        linear-gradient(90deg, var(--rail) 1px, transparent 1px),
        linear-gradient(var(--rail) 1px, transparent 1px);
      background-size: auto, 22px 22px, 22px 22px;
      box-shadow: var(--shadow);
    }

    .page-hero::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-strong), color-mix(in srgb, var(--info) 58%, transparent) 58%, transparent 88%);
    }

    .page-hero::after {
      content: "";
      position: absolute;
      top: 18px;
      right: 18px;
      width: min(28vw, 240px);
      height: min(28vw, 240px);
      border-radius: 32px;
      background:
        radial-gradient(circle at center, color-mix(in srgb, var(--accent-dim) 88%, transparent) 0%, transparent 68%),
        linear-gradient(135deg, transparent 0 46%, var(--rail) 46% 47%, transparent 47% 100%);
      pointer-events: none;
      opacity: 0.9;
    }

    .page-hero__label {
      position: relative;
      z-index: 1;
      color: var(--accent-strong);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      margin-bottom: 14px;
    }

    h1,
    h2 {
      font-family: var(--font-display);
      font-weight: 400;
    }

    h1 {
      position: relative;
      z-index: 1;
      margin: 0;
      font-size: clamp(2.7rem, 6vw, 4.25rem);
      line-height: 0.94;
      letter-spacing: -0.03em;
      max-width: 11ch;
      text-wrap: balance;
    }

    .page-hero p {
      position: relative;
      z-index: 1;
      margin: 18px 0 0;
      max-width: 56ch;
      color: var(--text-dim);
      font-size: 1.02rem;
    }

    .glance {
      position: relative;
      padding: 22px 24px 24px;
    }

    .glance::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent 78%);
    }

    .glance__label {
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 0.72rem;
      margin-bottom: 14px;
      font-family: var(--font-mono);
    }

    .glance-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(6, minmax(0, 1fr));
    }

    .glance-card {
      --glance-accent: var(--accent);
      min-width: 0;
      position: relative;
      padding: 18px 16px 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface-elevated) 88%, transparent 12%);
      display: grid;
      gap: 10px;
      align-content: start;
      overflow: hidden;
    }

    .glance-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 3px;
      background: linear-gradient(90deg, var(--glance-accent), transparent 82%);
    }

    .glance-card--accent {
      --glance-accent: var(--accent);
      background: color-mix(in srgb, var(--surface-elevated) 90%, var(--accent-dim) 10%);
    }
    .glance-card--muted {
      --glance-accent: var(--text-dim);
      background: color-mix(in srgb, var(--surface-elevated) 96%, transparent 4%);
    }
    .glance-card--warning {
      --glance-accent: var(--warning);
      background: color-mix(in srgb, var(--surface-elevated) 90%, var(--warning-dim) 10%);
    }
    .glance-card--success {
      --glance-accent: var(--success);
      background: color-mix(in srgb, var(--surface-elevated) 90%, var(--success-dim) 10%);
    }
    .glance-card--info {
      --glance-accent: var(--info);
      background: color-mix(in srgb, var(--surface-elevated) 90%, var(--info-dim) 10%);
    }

    .glance-card__label {
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.68rem;
    }

    .glance-card__value {
      font-size: clamp(1.7rem, 3vw, 2.25rem);
      line-height: 1;
      font-weight: 700;
    }

    .glance-card p {
      margin: 0;
      color: var(--text-dim);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .sections {
      display: grid;
      gap: 18px;
    }

    .approval-section {
      --section-accent: var(--accent);
      position: relative;
      padding: 26px 24px 24px;
      animation: fadeUp 420ms ease both;
      animation-delay: calc(var(--section-index, 0) * 0.03s);
    }

    .approval-section::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 2px;
      background: linear-gradient(90deg, var(--section-accent), transparent 78%);
    }

    .approval-section--change-summary,
    .approval-section--executive-summary,
    .approval-section--downstream-impact-if-approved {
      --section-accent: var(--accent);
    }

    .approval-section--scope,
    .approval-section--validator-status {
      --section-accent: var(--success);
    }

    .approval-section--risks-and-tradeoffs,
    .approval-section--traceability-map {
      --section-accent: var(--info);
    }

    .approval-section--blockers-and-unresolved-items {
      --section-accent: var(--warning);
    }

    .approval-section--snapshot-identity {
      --section-accent: var(--text-dim);
    }

    .approval-section[data-section-style="hero"] {
      background:
        linear-gradient(145deg, color-mix(in srgb, var(--surface-elevated) 86%, var(--accent-dim) 14%), var(--surface));
      border-color: color-mix(in srgb, var(--border-strong) 48%, var(--section-accent) 52%);
      box-shadow: var(--shadow);
    }

    .approval-section[data-section-style="elevated"] {
      background: color-mix(in srgb, var(--surface-elevated) 96%, transparent 4%);
      box-shadow: var(--shadow-soft);
    }

    .approval-section[data-section-style="recessed"] {
      background: color-mix(in srgb, var(--surface-recessed) 90%, transparent 10%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .section-top {
      display: flex;
      gap: 16px;
      align-items: start;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .section-heading {
      min-width: 0;
    }

    .section-kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid color-mix(in srgb, var(--section-accent) 28%, var(--border) 72%);
      background: color-mix(in srgb, var(--surface-elevated) 88%, var(--section-accent) 12%);
      color: var(--text-dim);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    .section-number {
      color: var(--section-accent);
    }

    h2 {
      margin: 0;
      font-size: clamp(1.55rem, 3.3vw, 2.1rem);
      line-height: 0.98;
      letter-spacing: -0.03em;
      text-wrap: balance;
      scroll-margin-top: 72px;
    }

    .section-content,
    .section-content > * {
      min-width: 0;
    }

    .hero-stack,
    .split-hero,
    .scope-grid,
    .review-card-grid,
    .mini-panel-grid,
    .visual-evidence__grid,
    .validator-grid,
    .snapshot-panel,
    .impact-timeline,
    .callout-stack,
    .traceability-list {
      display: grid;
      gap: 16px;
    }

    .hero-note,
    .summary-point,
    .scope-card,
    .review-card,
    .mini-panel,
    .visual-card,
    .validator-card,
    .delta-card,
    .timeline-item,
    .callout,
    .empty-state,
    .traceability-item,
    .diagram-shell,
    .code-file,
    .detail-panel {
      min-width: 0;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface-elevated) 95%, transparent 5%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .hero-note,
    .summary-point,
    .scope-card,
    .review-card,
    .mini-panel,
    .visual-card,
    .validator-card,
    .delta-card,
    .timeline-item,
    .callout,
    .empty-state,
    .snapshot-panel {
      padding: 16px;
    }

    .hero-note {
      display: grid;
      gap: 8px;
      background: color-mix(in srgb, var(--surface-elevated) 88%, var(--accent-dim) 12%);
    }

    .hero-note__label {
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.68rem;
    }

    .delta-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .delta-card__label,
    .review-card__label,
    .scope-card__label,
    .visual-evidence__label,
    .validator-card__label,
    .callout__label,
    .timeline-item__marker,
    .mini-panel h4,
    .diagram-shell__label,
    .evidence-source__label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .summary-points,
    .review-card-grid--decision,
    .review-card-grid--risk,
    .validator-grid,
    .visual-evidence__grid,
    .mini-panel-grid {
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }

    .summary-point {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: start;
      background: color-mix(in srgb, var(--surface-elevated) 90%, var(--accent-dim) 10%);
    }

    .summary-point__index,
    .timeline-item__marker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      min-width: 44px;
      aspect-ratio: 1;
      border-radius: 14px;
      background: color-mix(in srgb, var(--accent) 16%, transparent 84%);
      color: var(--accent-strong);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
    }

    .split-hero {
      grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
      align-items: start;
    }

    .split-hero__main,
    .split-hero__visual {
      min-width: 0;
      display: grid;
      gap: 16px;
    }

    .scope-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .scope-card--in {
      background: color-mix(in srgb, var(--surface-elevated) 92%, var(--success-dim) 8%);
    }

    .scope-card--out {
      background: color-mix(in srgb, var(--surface-elevated) 92%, var(--warning-dim) 8%);
    }

    .callout {
      border-left: 4px solid var(--warning);
      background: color-mix(in srgb, var(--surface-elevated) 88%, var(--warning-dim) 12%);
    }

    .review-card--risk {
      background: color-mix(in srgb, var(--surface-elevated) 92%, var(--info-dim) 8%);
    }

    .review-card--decision {
      background: color-mix(in srgb, var(--surface-elevated) 92%, var(--accent-dim) 8%);
    }

    .impact-timeline {
      position: relative;
      gap: 14px;
    }

    .impact-timeline::before {
      content: "";
      position: absolute;
      left: 22px;
      top: 10px;
      bottom: 10px;
      width: 1px;
      background: var(--border-strong);
    }

    .timeline-item {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      align-items: start;
      background: color-mix(in srgb, var(--surface-elevated) 96%, transparent 4%);
    }

    .traceability-item {
      padding: 0;
      overflow: hidden;
    }

    .traceability-item summary,
    .detail-panel summary {
      cursor: pointer;
      list-style: none;
      padding: 16px;
      display: flex;
      gap: 12px;
      align-items: start;
      justify-content: space-between;
    }

    .traceability-item summary::-webkit-details-marker,
    .detail-panel summary::-webkit-details-marker {
      display: none;
    }

    .traceability-item summary::after,
    .detail-panel summary::after {
      content: "+";
      color: var(--accent-strong);
      flex: none;
      line-height: 1;
      font-size: 1rem;
    }

    .traceability-item[open] summary::after,
    .detail-panel[open] summary::after {
      content: "−";
    }

    .traceability-item__id {
      padding: 6px 8px;
      border-radius: 999px;
      background: var(--accent-dim);
      color: var(--accent-strong);
      font-size: 0.72rem;
      line-height: 1;
      flex: none;
    }

    .traceability-item__claim {
      min-width: 0;
      font-weight: 600;
    }

    .traceability-item__body,
    .detail-panel > div,
    .detail-panel > .table-wrap,
    .detail-panel > pre {
      padding: 0 16px 16px;
    }

    .traceability-meta,
    .evidence-source {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      color: var(--text-dim);
      font-size: 0.86rem;
      margin-bottom: 12px;
    }

    .traceability-meta__label,
    .evidence-source__label {
      margin: 0;
      color: var(--text-dim);
    }

    .traceability-meta__sep,
    .evidence-source__sep {
      color: var(--text-dim);
    }

    blockquote {
      margin: 0;
      padding: 14px 16px;
      border-left: 3px solid var(--accent);
      background: color-mix(in srgb, var(--surface-elevated) 92%, var(--accent-dim) 8%);
      border-radius: 0 14px 14px 0;
      color: var(--text);
      overflow-wrap: anywhere;
    }

    .validator-card__top {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid var(--border);
    }

    .status-pill--passed {
      color: var(--success);
      background: var(--success-dim);
      border-color: color-mix(in srgb, var(--success) 40%, var(--border) 60%);
    }

    .status-pill--unknown {
      color: var(--warning);
      background: var(--warning-dim);
      border-color: color-mix(in srgb, var(--warning) 40%, var(--border) 60%);
    }

    .snapshot-grid {
      margin: 0;
      display: grid;
      gap: 12px;
    }

    .snapshot-grid__row {
      display: grid;
      gap: 6px;
      grid-template-columns: minmax(140px, 180px) minmax(0, 1fr);
      align-items: start;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .snapshot-grid__row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .snapshot-grid dt {
      color: var(--text-dim);
      font-size: 0.86rem;
    }

    .snapshot-grid dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .snapshot-grid__value--mono {
      font-family: var(--font-mono);
      font-size: 0.88rem;
    }

    .table-wrap {
      overflow-x: auto;
      min-width: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th,
    td {
      padding: 12px 10px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid var(--border);
      overflow-wrap: anywhere;
    }

    th {
      position: sticky;
      top: 0;
      background: color-mix(in srgb, var(--surface-elevated) 96%, transparent 4%);
      color: var(--text-dim);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    tbody tr:nth-child(even) {
      background: color-mix(in srgb, var(--surface-elevated) 97%, transparent 3%);
    }

    .mini-panel h4,
    .subheading {
      margin: 0 0 10px;
      color: var(--accent-strong);
      font-size: 0.95rem;
    }

    .mini-panel__body,
    .review-card__body,
    .callout__body,
    .delta-card__body,
    .scope-card__body,
    .summary-point__body,
    .timeline-item__body,
    .visual-card__body {
      min-width: 0;
      display: grid;
      gap: 12px;
    }

    .visual-evidence {
      display: grid;
      gap: 14px;
    }

    .visual-card {
      display: grid;
      gap: 12px;
      background: color-mix(in srgb, var(--surface-elevated) 92%, var(--info-dim) 8%);
    }

    .diagram-shell {
      display: grid;
      gap: 12px;
      padding: 14px;
      background: color-mix(in srgb, var(--surface-elevated) 98%, transparent 2%);
    }

    .diagram-shell__head {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      align-items: center;
    }

    .diagram-shell__label {
      margin: 0;
    }

    .zoom-controls {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      flex-wrap: wrap;
    }

    .zoom-controls button {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      min-width: 44px;
      cursor: pointer;
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
      font-family: var(--font-mono);
      font-size: 0.8rem;
    }

    .zoom-controls button:hover {
      transform: translateY(-1px);
      background: var(--accent-dim);
      border-color: color-mix(in srgb, var(--accent) 40%, var(--border) 60%);
    }

    .mermaid-wrap {
      position: relative;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface-recessed) 82%, transparent 18%);
      min-height: 320px;
      overflow: hidden;
    }

    .mermaid-wrap[data-render-state="error"]::before {
      content: "Mermaid render failed. Use raw source below.";
      position: absolute;
      inset: 12px auto auto 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--warning-dim);
      color: var(--warning);
      font-family: var(--font-mono);
      font-size: 0.72rem;
      z-index: 2;
    }

    .mermaid-viewport {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 320px;
      overflow: hidden;
      cursor: grab;
    }

    .mermaid-viewport.is-panning {
      cursor: grabbing;
      user-select: none;
    }

    .mermaid-canvas {
      position: absolute;
      inset: 0 auto auto 0;
      transform-origin: top left;
      will-change: transform;
    }

    .mermaid-canvas svg {
      height: auto;
      width: auto;
      max-width: none;
      display: block;
    }

    .mermaid .nodeLabel {
      font-family: var(--font-body) !important;
      font-size: 16px !important;
      color: var(--text) !important;
    }

    .mermaid .edgeLabel,
    .mermaid .messageText {
      font-family: var(--font-mono) !important;
      font-size: 12px !important;
      color: var(--text-dim) !important;
      background-color: transparent !important;
    }

    .mermaid .edgeLabel rect {
      fill: color-mix(in srgb, var(--surface-elevated) 94%, transparent 6%) !important;
    }

    .mermaid .node rect,
    .mermaid .node circle,
    .mermaid .node polygon,
    .mermaid .actor,
    .mermaid .er.entityBox {
      stroke-width: 1.5px !important;
    }

    .detail-panel {
      overflow: hidden;
      padding: 0;
    }

    .detail-panel summary {
      color: var(--text);
      font-weight: 500;
    }

    .code-file {
      overflow: hidden;
      padding: 0;
    }

    .code-file__header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.16em;
      font-size: 0.68rem;
      font-family: var(--font-mono);
    }

    pre,
    .code-block {
      margin: 0;
      padding: 14px;
      background: var(--code-bg);
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.6;
    }

    p,
    ul {
      margin: 0;
    }

    .section-content > * + * {
      margin-top: 14px;
    }

    .rich-list {
      margin: 0;
      padding-left: 1.1rem;
      display: grid;
      gap: 8px;
    }

    .rich-list li {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .rich-list__detail {
      margin-top: 8px;
      color: var(--text-dim);
    }

    .empty-state {
      color: var(--text-dim);
      background: color-mix(in srgb, var(--surface-elevated) 98%, transparent 2%);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-delay: 0ms !important;
        transition-duration: 0.01ms !important;
      }
    }

    @media (max-width: 1260px) {
      .glance-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 1080px) {
      .layout {
        grid-template-columns: 1fr;
        padding-top: 0;
      }

      .toc {
        position: sticky;
        top: 0;
        z-index: 20;
        display: flex;
        gap: 6px;
        align-items: center;
        overflow-x: auto;
        max-height: none;
        background: color-mix(in srgb, var(--bg) 88%, transparent 12%);
        backdrop-filter: blur(10px);
        margin: 0 -20px;
        padding: 12px 20px;
        border-bottom: 1px solid var(--border);
        border-left: none;
      }

      .toc::-webkit-scrollbar {
        display: none;
      }

      .toc-title {
        display: none;
      }

      .toc a {
        white-space: nowrap;
        flex: none;
        border-left: none;
        border-bottom: 2px solid transparent;
        border-radius: 10px;
        background: transparent;
      }

      .toc a:hover,
      .toc a.active {
        border-bottom-color: var(--accent);
        border-left-color: transparent;
      }
    }

    @media (max-width: 960px) {
      .split-hero,
      .scope-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 820px) {
      .glance-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .approval-section,
      .page-hero,
      .glance {
        padding: 20px;
      }
    }

    @media (max-width: 560px) {
      .glance-grid {
        grid-template-columns: 1fr;
      }

      .summary-point,
      .timeline-item {
        grid-template-columns: 1fr;
      }

      .summary-point__index,
      .timeline-item__marker {
        width: fit-content;
      }

      .snapshot-grid__row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-approval-view="rich-v1">
  <div class="layout">
    <nav class="toc" id="approval-toc" aria-label="Approval sections">
      <div class="toc-title">Approval View</div>
      {{TOC}}
    </nav>

    <main class="main">
      <header class="page-hero">
        <div class="page-hero__label">Approval View</div>
        <h1>{{TITLE}}</h1>
        <p>{{SUBTITLE}}</p>
      </header>

      <section class="glance" id="approval-glance" data-approval-glance>
        <div class="glance__label">At a Glance</div>
        <div class="glance-grid">
          {{GLANCE}}
        </div>
      </section>

      <script id="approval-view-metadata" type="application/json">{{METADATA_JSON}}</script>

      <article class="sections">
        {{BODY}}
      </article>
    </main>
  </div>

  <script>
    (function () {
      const toc = document.getElementById('approval-toc');
      if (!toc) return;
      const links = Array.from(toc.querySelectorAll('[data-toc-link]'));
      const sections = links
        .map((link) => {
          const id = link.getAttribute('href').slice(1);
          const el = document.getElementById(id);
          return el ? { link, el } : null;
        })
        .filter(Boolean);

      if (!sections.length) return;

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) return;
            links.forEach((link) => link.classList.remove('active'));
            const match = sections.find((section) => section.el === entry.target);
            if (!match) return;
            match.link.classList.add('active');
            if (window.innerWidth <= 1080) {
              match.link.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
          });
        },
        { rootMargin: '-10% 0px -80% 0px' }
      );

      sections.forEach((section) => observer.observe(section.el));
      links[0].classList.add('active');
    })();

    (async function () {
      const shells = Array.from(document.querySelectorAll('[data-mermaid-shell]'));
      if (!shells.length) return;

      const rootStyles = getComputedStyle(document.documentElement);
      const readVar = (name) => rootStyles.getPropertyValue(name).trim();

      let mermaid;
      try {
        const mod = await import('https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs');
        mermaid = mod.default || mod;
      } catch (error) {
        shells.forEach((shell) => {
          const wrap = shell.querySelector('.mermaid-wrap');
          if (wrap) wrap.dataset.renderState = 'error';
        });
        return;
      }

      mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'loose',
        theme: 'base',
        look: 'classic',
        themeVariables: {
          primaryColor: readVar('--surface-elevated'),
          primaryBorderColor: readVar('--info'),
          primaryTextColor: readVar('--text'),
          secondaryColor: readVar('--surface'),
          secondaryBorderColor: readVar('--accent'),
          secondaryTextColor: readVar('--text'),
          tertiaryColor: readVar('--surface-recessed'),
          tertiaryBorderColor: readVar('--warning'),
          tertiaryTextColor: readVar('--text'),
          lineColor: readVar('--border-strong'),
          noteBkgColor: readVar('--surface-elevated'),
          noteBorderColor: readVar('--accent'),
          noteTextColor: readVar('--text'),
          fontSize: '16px',
          fontFamily: readVar('--font-body') || 'IBM Plex Sans',
        },
      });

      const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

      const openMermaidInNewTab = (shell) => {
        const svg = shell.querySelector('svg');
        if (!svg) return;
        const win = window.open('', '_blank', 'noopener');
        if (!win) return;
        win.document.write(`<!doctype html><html><head><meta charset="utf-8"><title>Expanded Mermaid</title><style>body{margin:0;padding:24px;background:${readVar('--bg')};display:grid;place-items:center;}svg{max-width:100%;height:auto;background:${readVar('--surface')};border-radius:18px;border:1px solid ${readVar('--border')};padding:16px;}</style></head><body>${svg.outerHTML}</body></html>`);
        win.document.close();
      };

      const fitDiagram = (state) => {
        const svg = state.canvas.querySelector('svg');
        if (!svg) return;
        const viewportWidth = state.viewport.clientWidth - 32;
        const viewportHeight = state.viewport.clientHeight - 32;
        const box = svg.getBBox();
        const width = Math.max(box.width, svg.viewBox?.baseVal?.width || svg.clientWidth || 1);
        const height = Math.max(box.height, svg.viewBox?.baseVal?.height || svg.clientHeight || 1);
        const scale = clamp(Math.min(viewportWidth / width, viewportHeight / height, 1.35), 0.5, 2.5);
        state.scale = scale;
        state.x = (viewportWidth - width * scale) / 2 - box.x * scale + 16;
        state.y = (viewportHeight - height * scale) / 2 - box.y * scale + 16;
        applyTransform(state);
      };

      const applyTransform = (state) => {
        state.canvas.style.transform = `translate(${state.x}px, ${state.y}px) scale(${state.scale})`;
      };

      for (const [index, shell] of shells.entries()) {
        const sourceEl = shell.querySelector('[data-mermaid-source]');
        const canvas = shell.querySelector('[data-mermaid-canvas]');
        const viewport = shell.querySelector('[data-mermaid-viewport]');
        const wrap = shell.querySelector('.mermaid-wrap');
        if (!sourceEl || !canvas || !viewport || !wrap) continue;

        const source = sourceEl.textContent || '';
        try {
          const id = `approval-view-mermaid-${index}`;
          const rendered = await mermaid.render(id, source);
          canvas.innerHTML = rendered.svg;
        } catch (error) {
          wrap.dataset.renderState = 'error';
          continue;
        }

        const state = { shell, viewport, canvas, scale: 1, x: 16, y: 16, pointerId: null, startX: 0, startY: 0, originX: 0, originY: 0 };
        fitDiagram(state);

        viewport.addEventListener('pointerdown', (event) => {
          state.pointerId = event.pointerId;
          state.startX = event.clientX;
          state.startY = event.clientY;
          state.originX = state.x;
          state.originY = state.y;
          viewport.classList.add('is-panning');
          viewport.setPointerCapture(event.pointerId);
        });

        viewport.addEventListener('pointermove', (event) => {
          if (state.pointerId !== event.pointerId) return;
          state.x = state.originX + (event.clientX - state.startX);
          state.y = state.originY + (event.clientY - state.startY);
          applyTransform(state);
        });

        const endPan = (event) => {
          if (state.pointerId !== event.pointerId) return;
          state.pointerId = null;
          viewport.classList.remove('is-panning');
          if (viewport.hasPointerCapture(event.pointerId)) {
            viewport.releasePointerCapture(event.pointerId);
          }
        };

        viewport.addEventListener('pointerup', endPan);
        viewport.addEventListener('pointercancel', endPan);

        viewport.addEventListener(
          'wheel',
          (event) => {
            event.preventDefault();
            const delta = event.deltaY < 0 ? 0.12 : -0.12;
            state.scale = clamp(state.scale + delta, 0.35, 3.5);
            applyTransform(state);
          },
          { passive: false }
        );

        shell.querySelectorAll('[data-zoom-action]').forEach((button) => {
          button.addEventListener('click', () => {
            const action = button.getAttribute('data-zoom-action');
            if (action === 'in') state.scale = clamp(state.scale + 0.15, 0.35, 3.5);
            if (action === 'out') state.scale = clamp(state.scale - 0.15, 0.35, 3.5);
            if (action === 'reset' || action === 'fit') fitDiagram(state);
            if (action === 'expand') openMermaidInNewTab(shell);
            if (action === 'in' || action === 'out') applyTransform(state);
          });
        });

        window.addEventListener('resize', () => fitDiagram(state));
      }
    })();
  </script>
</body>
</html>
