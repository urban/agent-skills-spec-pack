<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0b1020;
      --panel: #131a2f;
      --panel-border: #24304f;
      --text: #e8ecf8;
      --muted: #a3afcc;
      --accent: #81a1ff;
      --accent-soft: rgba(129, 161, 255, 0.14);
      --code-bg: rgba(255, 255, 255, 0.06);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f8fc;
        --panel: #ffffff;
        --panel-border: #d9e0f2;
        --text: #172033;
        --muted: #56627d;
        --accent: #3558d6;
        --accent-soft: rgba(53, 88, 214, 0.08);
        --code-bg: rgba(23, 32, 51, 0.06);
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 88%, black) 100%);
      color: var(--text);
      line-height: 1.55;
    }

    .page {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }

    .page-header,
    .section {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 16px;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.12);
    }

    .page-header {
      padding: 24px 24px 18px;
      margin-bottom: 20px;
    }

    .page-header h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      line-height: 1.1;
    }

    .page-header p {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .section {
      padding: 22px 24px;
      margin-bottom: 16px;
    }

    h2, h3 {
      margin-top: 0;
      scroll-margin-top: 24px;
    }

    h2 {
      font-size: 1.25rem;
      margin-bottom: 14px;
      color: var(--accent);
    }

    h3 {
      font-size: 1rem;
      margin-bottom: 10px;
    }

    p, ul, pre {
      margin: 0 0 12px;
    }

    ul {
      padding-left: 1.2rem;
    }

    li {
      margin: 0.22rem 0;
    }

    code {
      font-family: "SFMono-Regular", ui-monospace, SFMono-Regular, Menlo, monospace;
      background: var(--code-bg);
      border-radius: 6px;
      padding: 0.08rem 0.35rem;
    }

    pre {
      overflow-x: auto;
      padding: 12px 14px;
      background: var(--code-bg);
      border-radius: 10px;
    }

    a {
      color: var(--accent);
    }

    .prose > :last-child,
    .section > :last-child {
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="page-header">
      <h1>{{TITLE}}</h1>
      <p>Generated {{GENERATED_AT}}</p>
    </header>
    <script id="approval-view-metadata" type="application/json">{{METADATA_JSON}}</script>
    <article class="prose">
{{BODY}}
    </article>
  </main>
</body>
</html>
